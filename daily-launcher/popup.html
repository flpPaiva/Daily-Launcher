<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 100%;
        max-height: 580px;
        overflow-y: auto;
        font-family: sans-serif;
        font-size: 13px;
        background: #f5f5f5;
        color: #333;
      }

      header {
        background: #005b97;
        color: white;
        padding: 12px 16px;
        font-weight: bold;
        font-size: 14px;
      }

      .content { padding: 12px 16px; }

      .upload-area {
        display: block;
        border: 2px dashed #aaa;
        border-radius: 6px;
        padding: 20px;
        text-align: center;
        cursor: pointer;
        background: white;
        margin-bottom: 8px;
        transition: border-color 0.2s;
      }
      .upload-area:hover { border-color: #005b97; }
      .upload-area.has-file { border-color: #4caf50; border-style: solid; }
      .upload-area input[type="file"] { display: none; }

      .upload-label {
        display: block;
        cursor: pointer;
        color: #666;
      }
      .upload-label span { display: block; font-size: 11px; margin-top: 4px; color: #999; }

      .form-group { margin-bottom: 10px; }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 4px;
        font-size: 12px;
        color: #555;
      }

      input[type="text"],
      select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #ccc;
        border-radius: 4px;
        font-size: 13px;
        background: white;
      }

      input[type="text"]:focus,
      select:focus {
        outline: none;
        border-color: #005b97;
      }

      #form-section { display: none; }
      #form-section.visible {
        display: block;
        animation: fadeIn 0.2s ease;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      .divider {
        border: none;
        border-top: 1px solid #ddd;
        margin: 12px 0;
      }

      .btn {
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 4px;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
        margin-top: 4px;
      }

      .btn-primary { background: #005b97; color: white; }
      .btn-primary:hover { background: #004a7c; }
      .btn-secondary {
        background: white;
        color: #005b97;
        border: 1px solid #005b97;
        margin-top: 6px;
      }
      .btn-secondary:hover { background: #eaf2fb; }

      footer {
        position: sticky;
        bottom: 0;
        background: white;
        border-top: 1px solid #ddd;
        padding: 8px 16px;
        display: flex;
        gap: 8px;
      }

      .btn-link {
        flex: 1;
        padding: 7px 4px;
        border: 1px solid #005b97;
        border-radius: 4px;
        background: white;
        color: #005b97;
        font-size: 12px;
        font-weight: bold;
        cursor: pointer;
        text-align: center;
      }
      .btn-link:hover { background: #eaf2fb; }

      .tools-section {
        margin-bottom: 10px;
        padding-bottom: 10px;
        border-bottom: 1px solid #ddd;
      }

      .rename-status {
        font-size: 11px;
        text-align: center;
        margin-top: 5px;
        min-height: 16px;
        color: #4caf50;
      }
      .rename-status.error { color: #e53935; }

      .status {
        font-size: 12px;
        text-align: center;
        min-height: 18px;
        color: #4caf50;
        margin-bottom: 8px;
      }
      .status.error { color: #e53935; }

      /* Modal de preview */
      #preview-modal {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.7);
        z-index: 100;
        flex-direction: column;
      }
      #preview-modal.open { display: flex; }

      #preview-modal-header {
        background: #005b97;
        color: white;
        padding: 8px 12px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        font-weight: bold;
        flex-shrink: 0;
      }

      #btn-close-preview {
        background: none;
        border: none;
        color: white;
        font-size: 18px;
        cursor: pointer;
        line-height: 1;
        padding: 0 4px;
      }

      #preview-scroll {
        overflow: auto;
        flex: 1;
        background: #555;
        padding: 8px;
        cursor: grab;
        user-select: none;
      }

      #preview-scroll.dragging {
        cursor: grabbing;
      }

      #preview-canvas {
        display: block;
        background: white;
        pointer-events: none; /* eventos de drag ficam no container */
      }

      #preview-nav {
        background: #333;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 10px;
        font-size: 12px;
        flex-shrink: 0;
        gap: 6px;
      }

      .nav-group {
        display: flex;
        align-items: center;
        gap: 4px;
      }

      #preview-nav button {
        background: #555;
        border: none;
        color: white;
        padding: 4px 9px;
        border-radius: 3px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
      }
      #preview-nav button:hover { background: #777; }
      #preview-nav button:disabled { opacity: 0.4; cursor: default; }

      #zoom-level { font-size: 11px; min-width: 36px; text-align: center; }
    </style>
  </head>
  <body>
    <header>Lançador de Diárias</header>

    <div class="content">
      <div class="tools-section">
        <button class="btn btn-secondary" id="btn-renamer" style="margin-top:0">
          Renomear arquivos para ordem númerica.
        </button>
        <div class="rename-status" id="rename-status"></div>
      </div>

      <label class="upload-area" id="upload-area" for="file-input">
        <span class="upload-label">
          📄 Clique para selecionar o PDF
          <span>ou arraste aqui</span>
        </span>
        <input type="file" id="file-input" accept=".pdf" />
      </label>

      <div class="status" id="status"></div>

      <div id="form-section">
        <div class="form-group">
          <label>Nº NFe</label>
          <input type="text" id="f-code" />
        </div>
        <div class="form-group">
          <label>Data</label>
          <input type="text" id="f-date" placeholder="DD/MM/AAAA" />
        </div>
        <div class="form-group">
          <label>Valor</label>
          <input type="text" id="f-vlTotal" placeholder="0.00" />
        </div>
        <div class="form-group">
          <label>Tipo</label>
          <select id="f-type">
            <option value="Meal">Meal</option>
            <option value="Mercado">Mercado</option>
            <option value="Combustível">Combustível</option>
          </select>
        </div>
        <div class="form-group">
          <label>Prioridade</label>
          <select id="f-priority">
            <option value="Mínima">Mínima</option>
            <option value="Baixa">Baixa</option>
            <option value="Média" selected>Média</option>
            <option value="Alta">Alta</option>
            <option value="Urgente">Urgente</option>
          </select>
        </div>

        <hr class="divider" />
        <button class="btn btn-secondary" id="btn-preview">Visualizar NFe</button>
        <button class="btn btn-primary" id="btn-lancar">Lançar Diária</button>
      </div>
    </div>

    <!-- Modal de preview -->
    <div id="preview-modal">
      <div id="preview-modal-header">
        <span id="preview-filename">NFe</span>
        <button id="btn-close-preview">✕</button>
      </div>
      <div id="preview-scroll">
        <canvas id="preview-canvas"></canvas>
      </div>
      <div id="preview-nav">
        <div class="nav-group">
          <button id="btn-prev-page">◀</button>
          <span id="page-info">1 / 1</span>
          <button id="btn-next-page">▶</button>
        </div>
        <div class="nav-group">
          <button id="btn-zoom-out">−</button>
          <span id="zoom-level">100%</span>
          <button id="btn-zoom-in">+</button>
        </div>
        <div class="nav-group">
          <button id="btn-close-preview-nav">✕ Fechar</button>
        </div>
      </div>
    </div>

    <footer>
      <button class="btn-link" id="btn-mantis">Reembolso de Diárias</button>
      <button class="btn-link" id="btn-apontamento">Apontamento de Atividades</button>
      <button class="btn-link" id="btn-nota-parana">Nota Paraná</button>
    </footer>

    <script type="module" src="popup.js"></script>
  </body>
</html>
