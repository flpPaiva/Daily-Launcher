<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Visualizar NFe</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        background: #555;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      #toolbar {
        background: #005b97;
        color: white;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 6px 12px;
        flex-shrink: 0;
        gap: 8px;
        font-size: 13px;
        font-weight: bold;
      }

      .nav-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #toolbar button {
        background: rgba(255,255,255,0.15);
        border: none;
        color: white;
        padding: 5px 11px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 13px;
        line-height: 1;
      }
      #toolbar button:hover    { background: rgba(255,255,255,0.3); }
      #toolbar button:disabled { opacity: 0.35; cursor: default; }

      #zoom-level { font-size: 12px; min-width: 42px; text-align: center; }
      #page-info  { font-size: 12px; min-width: 50px; text-align: center; }

      #scroll {
        flex: 1;
        overflow: auto;
        padding: 12px;
        cursor: grab;
        user-select: none;
        display: flex;
        justify-content: center;
        align-items: flex-start;
      }
      #scroll.dragging { cursor: grabbing; }

      #canvas {
        display: block;
        background: white;
        box-shadow: 0 2px 12px rgba(0,0,0,0.4);
        pointer-events: none;
      }

      #loading {
        color: white;
        font-size: 14px;
        margin: auto;
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <div class="nav-group">
        <button id="btn-prev">◀</button>
        <span id="page-info">— / —</span>
        <button id="btn-next">▶</button>
      </div>
      <div class="nav-group">
        <button id="btn-zoom-out">−</button>
        <span id="zoom-level">100%</span>
        <button id="btn-zoom-in">+</button>
      </div>
    </div>

    <div id="scroll">
      <span id="loading">Carregando PDF…</span>
      <canvas id="canvas" style="display:none"></canvas>
    </div>

    <script type="module" src="preview.js"></script>
  </body>
</html>
